name: Build APK
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup
      run: |
        sudo apt update
        sudo apt install -y python3-pip openjdk-17-jdk zlib1g-dev libssl-dev libffi-dev autoconf automake libtool
        pip3 install buildozer
    - name: Build APK
      run: buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: Zerogram-APK
        path: bin/*.apk
